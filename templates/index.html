<!DOCTYPE html>
<html>
<head>
    <title>Solar Dashboard</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>

<body>

<main class="dashboard-layout">
    <header class="panel-header">
        <h1>Solar Dashboard</h1>
    </header>

    <section class="diagram-board" aria-label="Power flow diagram">
        <svg class="diagram-flow" viewBox="0 0 760 760" role="img" aria-hidden="true">
            <g>
                <path class="flow-track" d="M258 258 L310 310" />
                <path class="flow-track" d="M502 258 L450 310" />
                <path class="flow-track" d="M502 502 L450 450" />
                <path class="flow-track" d="M258 502 L310 450" />
            </g>
            <g id="flow-pv"></g>
            <g id="flow-house"></g>
            <g id="flow-battery"></g>
            <g id="flow-grid"></g>
        </svg>

        <div id="pv" class="node node--pv">
            <div id="p_pv" class="value">0 W</div>
            <div class="circle pv"><i class="fas fa-sun"></i></div>
        </div>

        <div id="house" class="node node--house">
            <div id="p_load" class="value">0 W</div>
            <div class="circle house"><i class="fas fa-plug"></i></div>
        </div>

        <div id="grid" class="node node--grid">
            <div id="p_grid" class="value">0 W</div>
            <div class="circle gridc"><i class="fas fa-tower-broadcast"></i></div>
        </div>

        <div id="battery" class="node node--battery">
            <div id="p_batt" class="value">0 W</div>
            <div class="circle battery">
                <div id="batteryFill" class="battery-fill"></div>
                <div class="battery-content">
                    <i class="fas fa-battery-three-quarters"></i>
                    <div id="soc" class="battery-text">0%</div>
                </div>
            </div>
        </div>

        <div class="hub" aria-hidden="true">
            <div class="hub-outer">
                <div class="hub-inner">
                    <i class="fas fa-solar-panel"></i>
                </div>
            </div>
        </div>
    </section>
</main>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

</body>
</html>
